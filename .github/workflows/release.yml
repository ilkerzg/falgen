name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          cd npm
          npm version "$TAG" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-13
            platform: darwin
            arch: amd64
          - os: macos-14
            platform: darwin
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pyinstaller

      - name: Build binary
        run: pyinstaller falgen.spec --noconfirm

      - name: Verify binary
        run: ./dist/falgen --version

      - name: Package
        run: |
          cd dist
          tar -czf falgen_${{ matrix.platform }}_${{ matrix.arch }}.tar.gz falgen

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: falgen_${{ matrix.platform }}_${{ matrix.arch }}
          path: dist/falgen_${{ matrix.platform }}_${{ matrix.arch }}.tar.gz

  github-release:
    needs: [build-binaries, publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          cd release && sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
